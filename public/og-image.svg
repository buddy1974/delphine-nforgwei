<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2D0645;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#450B6B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A0330;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#D4922B;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#E8B84B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4922B;stop-opacity:0" />
    </linearGradient>
    <radialGradient id="glow1" cx="80%" cy="20%" r="40%">
      <stop offset="0%" style="stop-color:#8B1BA7;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#8B1BA7;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="glow2" cx="15%" cy="80%" r="35%">
      <stop offset="0%" style="stop-color:#6B0FA0;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#6B0FA0;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#glow1)" />
  <rect width="1200" height="630" fill="url(#glow2)" />

  <!-- Decorative border frame -->
  <rect x="32" y="32" width="1136" height="566" fill="none" stroke="#D4922B" stroke-width="1" stroke-opacity="0.35" rx="4" />
  <rect x="40" y="40" width="1120" height="550" fill="none" stroke="#D4922B" stroke-width="0.5" stroke-opacity="0.15" rx="3" />

  <!-- Top accent dots -->
  <circle cx="56" cy="56" r="3" fill="#D4922B" fill-opacity="0.6" />
  <circle cx="1144" cy="56" r="3" fill="#D4922B" fill-opacity="0.6" />
  <circle cx="56" cy="574" r="3" fill="#D4922B" fill-opacity="0.6" />
  <circle cx="1144" cy="574" r="3" fill="#D4922B" fill-opacity="0.6" />

  <!-- Gold horizontal rule top -->
  <rect x="80" y="160" width="200" height="2" fill="url(#goldLine)" rx="1" />

  <!-- REV. label -->
  <text x="80" y="148" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="400" letter-spacing="6" fill="#D4922B" fill-opacity="0.9" text-transform="uppercase">REV.</text>

  <!-- Main name -->
  <text x="80" y="270" font-family="Georgia, 'Times New Roman', serif" font-size="80" font-weight="700" fill="#FFFFFF" letter-spacing="-1">Delphine</text>
  <text x="80" y="365" font-family="Georgia, 'Times New Roman', serif" font-size="80" font-weight="700" fill="#FFFFFF" letter-spacing="-1">Nforgwei</text>

  <!-- Gold divider line -->
  <rect x="80" y="395" width="300" height="3" fill="url(#goldLine)" rx="1" />

  <!-- Subtitle -->
  <text x="80" y="445" font-family="'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="300" fill="#FFFFFF" fill-opacity="0.85" letter-spacing="3">Pastor  ·  Coach  ·  Founder</text>

  <!-- Bottom organization line -->
  <text x="80" y="540" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="400" fill="#D4922B" fill-opacity="0.9" letter-spacing="2">DRIMP Foundation  |  Cameroon</text>

  <!-- Decorative right side pattern -->
  <circle cx="980" cy="315" r="200" fill="none" stroke="#D4922B" stroke-width="0.8" stroke-opacity="0.12" />
  <circle cx="980" cy="315" r="160" fill="none" stroke="#D4922B" stroke-width="0.8" stroke-opacity="0.10" />
  <circle cx="980" cy="315" r="120" fill="none" stroke="#D4922B" stroke-width="0.8" stroke-opacity="0.08" />
  <circle cx="980" cy="315" r="80" fill="#8B1BA7" fill-opacity="0.15" />

  <!-- Website URL -->
  <text x="1120" y="570" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="300" fill="#FFFFFF" fill-opacity="0.4" text-anchor="end" letter-spacing="1">delphine-nforgwei.com</text>
</svg>
